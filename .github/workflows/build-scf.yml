name: Build for Tencent Cloud SCF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd easyvoice/packages/backend
          npm install --ignore-scripts

      - name: Build TypeScript
        run: |
          cd easyvoice/packages/backend
          npm run build

      - name: Create deployment package
        run: |
          cd easyvoice/packages/backend
          mkdir -p deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp -r src deploy/  # for config files
          cp ../packages/shared deploy/

          # Create scf_bootstrap
          cat > deploy/scf_bootstrap << 'EOF'
#!/bin/bash
export PORT=9000
export NODE_ENV=production
cd /var/user
/var/lang/node18/bin/node dist/index.js
EOF
          chmod +x deploy/scf_bootstrap

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: scf-package
          path: easyvoice/packages/backend/deploy/
