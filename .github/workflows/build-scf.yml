name: Build for Tencent Cloud SCF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd easyvoice/packages/backend
          npm install --include=dev --ignore-scripts
          npm install tsx --save-dev --ignore-scripts

      - name: Create deployment package
        run: |
          cd easyvoice/packages/backend
          mkdir -p deploy
          cp -r node_modules deploy/
          cp package.json deploy/
          cp -r src deploy/
          cp -r ../packages/shared deploy/
          ls -la

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: scf-package
          path: easyvoice/packages/backend/
