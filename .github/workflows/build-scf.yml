name: Build for Tencent Cloud SCF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd easyvoice/packages/backend
          npm install --ignore-scripts

      - name: Build TypeScript
        run: |
          cd easyvoice/packages/backend
          npm run build

      - name: Create deployment package
        run: |
          cd easyvoice/packages/backend
          mkdir -p deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp -r src deploy/
          cp -r ../packages/shared deploy/
          echo '#!/bin/bash' > deploy/scf_bootstrap
          echo 'export PORT=9000' >> deploy/scf_bootstrap
          echo 'export NODE_ENV=production' >> deploy/scf_bootstrap
          echo 'cd /var/user' >> deploy/scf_bootstrap
          echo '/var/lang/node18/bin/node dist/index.js' >> deploy/scf_bootstrap
          chmod +x deploy/scf_bootstrap

      - name: Upload package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scf-package
          path: easyvoice/packages/backend/deploy/
